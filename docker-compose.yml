services:
  limem-service:
    build: .
    image: limem-service:latest
    container_name: limem-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      SERVICE_DB_PATH: /app/DB/service.kz
      CONSOLIDATION_LOG_PATH: /app/outputs/consolidation_log.jsonl
      EVENT_MERGE_TRACE_LOG_PATH: /app/outputs/event_merge_trace.jsonl
      GRAPH_OUTPUT_DIR: /app/outputs
    ports:
      - "127.0.0.1:8012:8000"
    volumes:
      - ./DB:/app/DB
      - ./outputs:/app/outputs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
